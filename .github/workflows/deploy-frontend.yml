name: Deploy Frontend to Vercel

on:
  push:
    branches: [main]
    paths:
      - "front/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front/study_flow

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.8.0
        with:
          flutter-version: "3.27.4"
          channel: stable
          cache: true
          cache-key: "flutter-:os:-:channel:-:version:-:arch:-:hash:"

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build web
        run: |
          API_BASE_VALUE="${API_BASE:-https://awake-reverence-production-0a05.up.railway.app}"
          flutter build web --release --dart-define=API_BASE="$API_BASE_VALUE"
        env:
          API_BASE: ${{ secrets.API_BASE }}

      - name: Deploy to Vercel
        run: npx vercel@latest deploy --prod --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
