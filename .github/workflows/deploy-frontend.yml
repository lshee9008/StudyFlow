name: Deploy Frontend to Vercel

on:
  push:
    branches: [main]
    paths:
      - "front/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front/study_flow

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # subosito/flutter-action 대신 직접 설치 (Node.js 버전 의존성 없음)
      - name: Install Flutter
        run: |
          FLUTTER_VERSION="3.44.0"
          curl -fsSL \
            "https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_${FLUTTER_VERSION}-stable.tar.xz" \
            | tar xJ -C "$HOME"
          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"
          # git safe.directory 설정 (flutter SDK 내부 git 명령 실패 방지)
          git config --global --add safe.directory "$HOME/flutter"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Flutter version check
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build web
        run: |
          API_BASE_VALUE="${API_BASE:-https://awake-reverence-production-0a05.up.railway.app}"
          flutter build web --release --dart-define=API_BASE="$API_BASE_VALUE"
        env:
          API_BASE: ${{ secrets.API_BASE }}

      - name: Deploy to Vercel
        run: npx vercel@latest deploy --prod --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
