services:

  - type: web
    name: studyflow-api
    env: docker
    image:
      url: docker.io/lshee9008/studyflow-api:latest
    plan: free
    region: singapore
    healthCheckPath: /health
    autoDeploy: false
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: studyflow-db
          property: connectionString
      - key: REDIS_URL
        value: ""
      - key: OLLAMA_BASE_URL
        value: http://localhost:11434
      - key: TAVILY_API_KEY
        value: ""
      - key: ALLOWED_ORIGINS
        value: "*"

databases:
  - name: studyflow-db
    plan: free
    databaseName: studyflow
    user: studyflow
    region: singapore
