services:

  # ── FastAPI 백엔드 ───────────────────────────────────────
  - type: web
    name: studyflow-api
    env: docker
    dockerfilePath: ./back/Dockerfile
    dockerContext: ./back
    plan: free
    region: oregon
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: studyflow-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: studyflow-redis
          property: connectionString
      - key: OLLAMA_BASE_URL
        value: http://localhost:11434
      - key: TAVILY_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: "*"
    healthCheckPath: /health
    autoDeploy: true

  # ── Redis ────────────────────────────────────────────────
  - type: redis
    name: studyflow-redis
    plan: free
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

# ── PostgreSQL ────────────────────────────────────────────
databases:
  - name: studyflow-db
    plan: free
    databaseName: studyflow
    user: studyflow
    region: oregon
