services:

  - type: web
    name: studyflow-api
    env: docker
    dockerfilePath: ./back/Dockerfile
    dockerContext: ./back
    plan: free
    region: oregon
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: studyflow-db
          property: connectionString
      - key: REDIS_URL
        value: ""
      - key: OLLAMA_BASE_URL
        value: http://localhost:11434
      - key: TAVILY_API_KEY
        value: ""
      - key: ALLOWED_ORIGINS
        value: "*"

databases:
  - name: studyflow-db
    plan: free
    databaseName: studyflow
    user: studyflow
    region: oregon
